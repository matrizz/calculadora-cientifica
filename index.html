<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <link rel="stylesheet" href="./src/styles/globals.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer type="module" src="dist/index.js"></script>
  </head>
  <body class="bg-gray-900 flex items-center justify-center h-screen w-screen">
    <main class="flex w-full h-full items-center justify-center">

      <div class="bg-gray-800 p-4 rounded-2xl shadow-xl w-[32rem]">
        <input id="display" autocomplete="off"
          class="w-full mb-4 p-2 outline-none text-right text-xl bg-gray-700 text-white rounded" />

        <div class="flex justify-between space-x-2">
          <div id="buttons" class="grid grid-cols-4 gap-2 flex-1"></div>

          <div class="grid grid-cols-2 gap-2" id="extras"></div>
        </div>
      </div>

      <div>
        <label class="flex items-center gap-3 m-4 cursor-pointer select-none bg-gray-700 px-3 py-2 rounded-lg">
          <div class="relative">
            <input type="checkbox" id="enable-keyboard" class="sr-only peer" />
            <div class="w-10 h-5 bg-gray-600 rounded-full peer-checked:bg-blue-600 transition"></div>
            <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition peer-checked:translate-x-5"></div>
          </div>
          <span class="text-white text-sm">Enable Keyboard</span>
          <span class="text-white/20">Unstable (beta)</span>
        </label>
        <label class="flex items-center gap-3 m-4 cursor-pointer select-none bg-gray-700 px-3 py-2 rounded-lg">
          <div class="relative">
            <input type="checkbox" id="enable-auto-convert" class="sr-only peer" />
            <div class="w-10 h-5 bg-gray-600 rounded-full peer-checked:bg-blue-600 transition"></div>
            <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition peer-checked:translate-x-5"></div>
          </div>
          <span class="text-white text-sm">Auto convert to rad</span>
        </label>
      </div>

    </main>
  </body>
</html>
